<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #222;
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 10px;
      justify-content: center;
      margin-top: 30px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: white;
      color: black;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cell:hover {
      background: #ddd;
    }

    #status {
      margin-top: 20px;
      font-size: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      background: #4facfe;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #007bff;
    }
  </style>
</head>
<body>

<h1>❌ Tic Tac Toe ⭕</h1>

<div class="board" id="board"></div>

<div id="status">Player X Turn</div>

<button type="button" onclick="restartGame()">Restart</button>
<button type="button" onclick="window.location.href='../index.html'">Back to Dashboard</button>

<script>
const board = document.getElementById("board");
const statusText = document.getElementById("status");

let cells = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const winPatterns = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// Create Board
function createBoard() {
  board.innerHTML = "";
  cells.forEach((cell, index) => {
    const div = document.createElement("div");
    div.classList.add("cell");
    div.innerText = cell;
    div.addEventListener("click", () => handleClick(index));
    board.appendChild(div);
  });
}

// Handle Click
function handleClick(index) {
  if (cells[index] !== "" || !gameActive) return;

  cells[index] = currentPlayer;
  createBoard();

  if (checkWinner()) {
    statusText.innerText = `Player ${currentPlayer} Wins! 🎉`;
    gameActive = false;
    return;
  }

  if (!cells.includes("")) {
    statusText.innerText = "It's a Draw!";
    gameActive = false;
    return;
  }

  currentPlayer = currentPlayer === "X" ? "O" : "X";
  statusText.innerText = `Player ${currentPlayer} Turn`;
}

// Check Winner
function checkWinner() {
  return winPatterns.some(pattern => {
    return pattern.every(index => cells[index] === currentPlayer);
  });
}

// Restart
function restartGame() {
  cells = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  statusText.innerText = "Player X Turn";
  createBoard();
}

// Init
createBoard();
</script>

</body>
</html>
